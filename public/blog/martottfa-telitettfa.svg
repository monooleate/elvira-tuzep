<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Shadow filters -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="50%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <!-- Wood interior color -->
    <radialGradient id="woodCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="70%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C49060"/>
    </radialGradient>
    <!-- Dipped surface treatment (rose/pink) -->
    <radialGradient id="dippedSurface" cx="50%" cy="50%" r="50%">
      <stop offset="82%" stop-color="transparent"/>
      <stop offset="85%" stop-color="#F9A8D4"/>
      <stop offset="92%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </radialGradient>
    <!-- Pressure treated (full penetration, emerald) -->
    <radialGradient id="pressureTreated" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="30%" stop-color="#34D399"/>
      <stop offset="60%" stop-color="#10B981"/>
      <stop offset="85%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>
    <!-- Arrow marker -->
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#DB2777"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#047857"/>
    </marker>
    <marker id="arrowGreenReverse" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8 0 L0 3 L8 6 Z" fill="#047857"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="16"/>
  <rect width="800" height="400" fill="none" stroke="#E5E7EB" stroke-width="1" rx="16"/>

  <!-- ===== LEFT SIDE: DIPPED (IMERSIE) - Surface only ===== -->
  <g transform="translate(130, 55)">
    <!-- Card background -->
    <rect x="-80" y="-15" width="290" height="320" rx="12" fill="white" opacity="0.5"/>

    <!-- Wood cross-section (dipped - surface only) -->
    <g filter="url(#shadow)">
      <!-- Outer bark ring -->
      <circle cx="65" cy="115" r="100" fill="#8B6914" opacity="0.3"/>
      <!-- Main wood body -->
      <circle cx="65" cy="115" r="95" fill="url(#woodCore)"/>
      <!-- Annual rings -->
      <circle cx="65" cy="115" r="80" fill="none" stroke="#C49060" stroke-width="0.8" opacity="0.5"/>
      <circle cx="65" cy="115" r="65" fill="none" stroke="#C49060" stroke-width="0.7" opacity="0.4"/>
      <circle cx="65" cy="115" r="50" fill="none" stroke="#C49060" stroke-width="0.6" opacity="0.4"/>
      <circle cx="65" cy="115" r="35" fill="none" stroke="#C49060" stroke-width="0.5" opacity="0.3"/>
      <circle cx="65" cy="115" r="20" fill="none" stroke="#C49060" stroke-width="0.4" opacity="0.3"/>
      <!-- Center pith -->
      <circle cx="65" cy="115" r="5" fill="#B8956A"/>
      <!-- THIN pink/rose treatment layer (surface only) -->
      <circle cx="65" cy="115" r="95" fill="none" stroke="#EC4899" stroke-width="8" opacity="0.7"/>
      <circle cx="65" cy="115" r="95" fill="none" stroke="#DB2777" stroke-width="3" opacity="0.5"/>
    </g>

    <!-- Depth indicator arrows (shallow) -->
    <g transform="translate(65, 115)">
      <!-- Arrow pointing inward from right (short - only surface) -->
      <line x1="105" y1="0" x2="90" y2="0" stroke="#DB2777" stroke-width="2" marker-end="url(#arrowPink)"/>
      <!-- Arrow pointing inward from top (short) -->
      <line x1="0" y1="-105" x2="0" y2="-90" stroke="#DB2777" stroke-width="2" marker-end="url(#arrowPink)"/>
      <!-- Arrow pointing inward from left (short) -->
      <line x1="-105" y1="0" x2="-90" y2="0" stroke="#DB2777" stroke-width="2" marker-end="url(#arrowPink)"/>
      <!-- Small depth markers -->
      <line x1="88" y1="-4" x2="88" y2="4" stroke="#DB2777" stroke-width="1.5"/>
      <line x1="4" y1="-88" x2="-4" y2="-88" stroke="#DB2777" stroke-width="1.5"/>
      <line x1="-88" y1="-4" x2="-88" y2="4" stroke="#DB2777" stroke-width="1.5"/>
    </g>

    <!-- Durability icon: short calendar (2-5 years) -->
    <g transform="translate(5, 240)">
      <rect x="0" y="0" width="52" height="52" rx="10" fill="#FFF1F2" stroke="#EC4899" stroke-width="1.5"/>
      <!-- Calendar body -->
      <rect x="11" y="14" width="30" height="26" rx="3" fill="none" stroke="#BE185D" stroke-width="1.5"/>
      <line x1="11" y1="22" x2="41" y2="22" stroke="#BE185D" stroke-width="1.5"/>
      <!-- Calendar hooks -->
      <line x1="19" y1="11" x2="19" y2="17" stroke="#BE185D" stroke-width="2" stroke-linecap="round"/>
      <line x1="33" y1="11" x2="33" y2="17" stroke="#BE185D" stroke-width="2" stroke-linecap="round"/>
      <!-- X marks (short life) -->
      <path d="M18 28 L24 34 M24 28 L18 34" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M30 28 L36 34 M36 28 L30 34" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Warning/fragile icon -->
    <g transform="translate(70, 240)">
      <rect x="0" y="0" width="52" height="52" rx="10" fill="#FFF1F2" stroke="#EC4899" stroke-width="1.5"/>
      <!-- Crack/break lines -->
      <path d="M26 14 L22 22 L28 24 L20 38" fill="none" stroke="#BE185D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Water drops washing off -->
      <path d="M34 18 Q36 22 34 24" fill="none" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M38 22 Q40 26 38 28" fill="none" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Rose accent bar -->
    <rect x="-15" y="298" width="190" height="4" rx="2" fill="#EC4899" opacity="0.5"/>
  </g>

  <!-- ===== CENTER DIVIDER ===== -->
  <g transform="translate(370, 80)">
    <!-- Vertical dashed line -->
    <line x1="30" y1="0" x2="30" y2="75" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
    <!-- VS circle -->
    <circle cx="30" cy="120" r="36" fill="white" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="30" cy="120" r="30" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Contrast arrows -->
    <path d="M18 112 L12 120 L18 128" fill="none" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 112 L48 120 L42 128" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Vertical dashed line -->
    <line x1="30" y1="165" x2="30" y2="260" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  </g>

  <!-- ===== RIGHT SIDE: PRESSURE TREATED (IMPREGNAT) - Full penetration ===== -->
  <g transform="translate(530, 55)">
    <!-- Card background -->
    <rect x="-80" y="-15" width="290" height="320" rx="12" fill="white" opacity="0.5"/>

    <!-- Wood cross-section (pressure treated - fully penetrated) -->
    <g filter="url(#shadow)">
      <!-- Outer bark ring -->
      <circle cx="65" cy="115" r="100" fill="#047857" opacity="0.3"/>
      <!-- Fully treated wood body (green throughout) -->
      <circle cx="65" cy="115" r="95" fill="url(#pressureTreated)"/>
      <!-- Annual rings (visible through treatment) -->
      <circle cx="65" cy="115" r="80" fill="none" stroke="#34D399" stroke-width="1" opacity="0.4"/>
      <circle cx="65" cy="115" r="65" fill="none" stroke="#34D399" stroke-width="0.8" opacity="0.35"/>
      <circle cx="65" cy="115" r="50" fill="none" stroke="#34D399" stroke-width="0.7" opacity="0.3"/>
      <circle cx="65" cy="115" r="35" fill="none" stroke="#6EE7B7" stroke-width="0.6" opacity="0.3"/>
      <circle cx="65" cy="115" r="20" fill="none" stroke="#6EE7B7" stroke-width="0.5" opacity="0.25"/>
      <!-- Center pith (small untreated core) -->
      <circle cx="65" cy="115" r="8" fill="#D4A574" opacity="0.6"/>
      <circle cx="65" cy="115" r="5" fill="#E8D5B7" opacity="0.5"/>
    </g>

    <!-- Depth indicator arrows (deep - full penetration) -->
    <g transform="translate(65, 115)">
      <!-- Arrow from right edge going deep -->
      <line x1="105" y1="0" x2="15" y2="0" stroke="#047857" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <!-- Arrow from top going deep -->
      <line x1="0" y1="-105" x2="0" y2="-15" stroke="#047857" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <!-- Arrow from left going deep -->
      <line x1="-105" y1="0" x2="-15" y2="0" stroke="#047857" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <!-- Deep penetration marker lines -->
      <line x1="13" y1="-6" x2="13" y2="6" stroke="#047857" stroke-width="1.5"/>
      <line x1="6" y1="-13" x2="-6" y2="-13" stroke="#047857" stroke-width="1.5"/>
      <line x1="-13" y1="-6" x2="-13" y2="6" stroke="#047857" stroke-width="1.5"/>
    </g>

    <!-- Durability icon: long calendar (15-25 years) -->
    <g transform="translate(5, 240)">
      <rect x="0" y="0" width="52" height="52" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
      <!-- Calendar body -->
      <rect x="11" y="14" width="30" height="26" rx="3" fill="none" stroke="#047857" stroke-width="1.5"/>
      <line x1="11" y1="22" x2="41" y2="22" stroke="#047857" stroke-width="1.5"/>
      <!-- Calendar hooks -->
      <line x1="19" y1="11" x2="19" y2="17" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
      <line x1="33" y1="11" x2="33" y2="17" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
      <!-- Checkmarks (long life) -->
      <path d="M17 29 L20 32 L25 27" fill="none" stroke="#047857" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M29 29 L32 32 L37 27" fill="none" stroke="#047857" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Shield/protection icon -->
    <g transform="translate(70, 240)">
      <rect x="0" y="0" width="52" height="52" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
      <!-- Shield -->
      <path d="M26 12 L40 18 L40 30 Q40 40 26 44 Q12 40 12 30 L12 18 Z" fill="none" stroke="#047857" stroke-width="2" stroke-linejoin="round"/>
      <path d="M20 28 L24 32 L34 22" fill="none" stroke="#047857" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Emerald accent bar -->
    <rect x="-15" y="298" width="190" height="4" rx="2" fill="#059669" opacity="0.5"/>
  </g>

  <!-- Decorative corner accents -->
  <circle cx="20" cy="20" r="4" fill="#EC4899" opacity="0.2"/>
  <circle cx="780" cy="20" r="4" fill="#059669" opacity="0.2"/>
  <circle cx="20" cy="380" r="4" fill="#EC4899" opacity="0.2"/>
  <circle cx="780" cy="380" r="4" fill="#059669" opacity="0.2"/>
</svg>